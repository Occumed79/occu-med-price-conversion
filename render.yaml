services:
  - type: web
    name: occu-med-backend
    runtime: node
    buildCommand: npm ci
    startCommand: npm run start:backend
    plan: starter
    autoDeploy: true
    envVars:
      - key: FRONTEND_ORIGIN
        sync: false

  - type: web
    name: occu-med-frontend
    runtime: static
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    pullRequestPreviewsEnabled: true
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
